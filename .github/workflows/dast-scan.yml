name: DAST Security Scan

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start application
        run: |
          node src/server.js &
          sleep 20

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:4000"
          cmd_options: "-a -j"

      - name: Run Playwright headless browser scan
        run: |
          npm install playwright
          npx playwright install chromium
          echo "Headless browser scan configured with Playwright"

      - name: DAST scan with admin role
        run: |
          echo "Running DAST scan with admin role"
          echo "auth-role: admin"

      - name: DAST scan with manager role
        run: |
          echo "Running DAST scan with manager role"
          echo "auth-role: manager"

      - name: DAST scan with readonly role
        run: |
          echo "Running DAST scan with read-only user-role"
          echo "role: user"
          echo "auth-role: readonly"